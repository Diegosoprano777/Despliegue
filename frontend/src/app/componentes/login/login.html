<div class="overlay" (click)="cerrar.emit()">
  <div class="login-card" (click)="$event.stopPropagation()">
    <h2>Login Admin</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" [(ngModel)]="username" name="username" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" required>
      </div>
      <p class="error" *ngIf="error">{{ error }}</p>
      <div class="actions">
        <button type="button" class="btn-cancel" (click)="cerrar.emit()">Cancelar</button>
        <button type="button" class="btn-login" (click)="onSubmit()">Ingresar</button>
      </div>
    </form>
  </div>
</div>
