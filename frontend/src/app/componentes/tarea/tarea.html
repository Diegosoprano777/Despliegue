<app-tarjeta>
  <div class="tarea-container" [class.completada]="tarea.completada">
    
    <header class="tarea-header">
      <div class="titulo-wrapper">
        <h3 class="titulo">{{ tarea.titulo }}</h3>
        <span class="status-badge" *ngIf="tarea.completada">Completada</span>
      </div>
      <div class="fecha-limite">
        <span class="icon">📅</span>
        <span class="fecha">{{ tarea.expira | date:'mediumDate' }}</span>
      </div>
    </header>

    <div class="tarea-body">
      <p class="resumen">{{ tarea.resumen }}</p>
    </div>

    <footer class="tarea-actions" *ngIf="isEditable">
      <div class="action-group main-actions">
        <!-- BOTÓN TERMINAR -->
        <button *ngIf="!tarea.completada"
          class="btn-action btn-complete" 
          (click)="completarTarea(); $event.stopPropagation()"
          title="Marcar como completada">
          <span class="icon">○</span>
          <span class="label">Terminar</span>
        </button>

        <!-- BOTÓN REABRIR -->
        <button *ngIf="tarea.completada"
          class="btn-action btn-reopen" 
          (click)="reabrirTarea(); $event.stopPropagation()"
          title="Reabrir tarea" style="background: rgba(255, 170, 0, 0.2); border: 1px solid #ffaa00; color: #ffaa00;">
          <span class="icon">↺</span>
          <span class="label">Reabrir</span>
        </button>

        <!-- BOTÓN EDITAR -->
        <button 
          class="btn-action btn-edit" 
          (click)="editarTarea(); $event.stopPropagation()"
          title="Editar tarea">
          <span class="icon">✎</span>
          <span class="label">Editar</span>
        </button>
      </div>

      <div class="action-group danger-actions">
        <!-- BOTÓN ELIMINAR -->
        <button 
          class="btn-action btn-delete" 
          (click)="eliminarTarea(); $event.stopPropagation()"
          title="Eliminar tarea">
          <span class="icon">🗑</span>
        </button>
      </div>
    </footer>

  </div>
</app-tarjeta>
